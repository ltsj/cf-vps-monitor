name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    if: github.repository == 'ltsj/cf-vps-monitor'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy

      - name: Apply Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          node --input-type=module <<'NODE'
          const workerUrl = process.env.WORKER_URL?.replace(/\/$/, '');
          const accessToken = process.env.SUPABASE_ACCESS_TOKEN;
          if (!workerUrl || !accessToken) {
            throw new Error('WORKER_URL and SUPABASE_ACCESS_TOKEN must be configured');
          }

          let lastError;
          for (let attempt = 1; attempt <= 5; attempt += 1) {
            try {
              const response = await fetch(`${workerUrl}/api/setup/database/init`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accessToken }),
              });
              const body = await response.json().catch(() => ({}));
              if (!response.ok || body.success !== true) {
                throw new Error(`migration endpoint returned HTTP ${response.status}: ${body.error || 'unexpected response'}`);
              }
              console.log(`Database migrations are current (${body.applied ?? 0} applied, ${body.skipped ?? 0} skipped).`);
              process.exit(0);
            } catch (error) {
              lastError = error;
              if (attempt < 5) await new Promise(resolve => setTimeout(resolve, attempt * 3000));
            }
          }
          throw lastError;
          NODE
