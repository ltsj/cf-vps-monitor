name: Sync upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Deploy even when upstream has no new commits
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'ltsj/cf-vps-monitor'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Merge upstream main
        id: merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          merge_type="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/merge-upstream" -f branch=main --jq '.merge_type // "unknown"')"
          echo "GitHub sync result: ${merge_type}"
          if [[ "$merge_type" == "none" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy synchronized revision
        if: steps.merge.outputs.changed == 'true' || inputs.force_deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-cloudflare.yml --ref main --repo "$GITHUB_REPOSITORY"
